name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyserial pyinstaller

      - name: Build binary (arm64)
        run: |
          pyinstaller --onedir --windowed \
            --name "Videomancer Control" \
            --icon "icon.icns" \
            --hidden-import serial.tools.list_ports \
            --collect-submodules PyQt6 \
            --add-data "fonts:fonts" \
            main.py

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm certificate.p12

      - name: Sign the app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application: Nathaniel Coleman ($APPLE_TEAM_ID)"
          APP="dist/Videomancer Control.app"

          # Sign all nested Mach-O binaries first (inside-out), then the bundle.
          # --deep is deprecated; we walk the tree ourselves.
          find "$APP/Contents" \( -name "*.dylib" -o -name "*.so" \) -print0 \
            | xargs -0 -I {} codesign --force --timestamp --options runtime \
                --sign "$IDENTITY" {}

          # Sign embedded frameworks (Qt, Python)
          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" -type d -name "*.framework" -print0 \
              | xargs -0 -I {} codesign --force --timestamp --options runtime \
                  --sign "$IDENTITY" {}
          fi

          # Sign all executables in MacOS/ (main + any helpers from onedir)
          find "$APP/Contents/MacOS" -type f -perm +111 -print0 \
            | xargs -0 -I {} codesign --force --timestamp --options runtime \
                --entitlements entitlements.plist \
                --sign "$IDENTITY" {}

          codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist \
            --sign "$IDENTITY" \
            "$APP"

          # Verify hardened runtime is enabled and signature is valid
          codesign --verify --verbose=2 "$APP"
          codesign -dv --entitlements - "$APP"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "dist/Videomancer Control.app" notarize.zip

          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m

          xcrun stapler staple "dist/Videomancer Control.app"
          xcrun stapler validate "dist/Videomancer Control.app"
          spctl --assess --type execute --verbose=2 "dist/Videomancer Control.app" || true

      - name: Create zip
        run: |
          cd dist
          ditto -c -k --keepParent "Videomancer Control.app" ../VideomancerControl_macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos
          path: VideomancerControl_macOS.zip


  build-macos-intel:
    # Free Intel macOS runners (macos-13) have essentially no available
    # capacity, and "-large" variants aren't free on public repos. Instead,
    # run on the plentiful macos-latest (ARM) runner and drive everything
    # through Rosetta 2 using a native x86_64 Python. PyInstaller running
    # under Rosetta picks the x86_64 PyQt6-Qt6 wheel and produces a
    # Intel-native .app. Rosetta 2 is pre-installed on GitHub macOS runners.
    runs-on: macos-latest
    env:
      X64_PY: /Library/Frameworks/Python.framework/Versions/3.12/bin/python3
    steps:
      - uses: actions/checkout@v5

      - name: Install x86_64 Python via Rosetta
        run: |
          # Download the universal2 python.org installer (includes x86_64)
          curl -sSfL -o python.pkg \
            https://www.python.org/ftp/python/3.12.8/python-3.12.8-macos11.pkg
          sudo installer -pkg python.pkg -target /
          # Verify — x86_64 binary running under Rosetta 2
          arch -x86_64 "$X64_PY" -c "import platform, sys; print('Python', sys.version.split()[0], platform.machine())"

      - name: Install dependencies (x86_64)
        run: |
          arch -x86_64 "$X64_PY" -m pip install --upgrade pip
          arch -x86_64 "$X64_PY" -m pip install PyQt6 pyserial pyinstaller

      - name: Build binary (x86_64)
        run: |
          arch -x86_64 "$X64_PY" -m PyInstaller --onedir --windowed \
            --name "Videomancer Control" \
            --icon "icon.icns" \
            --hidden-import serial.tools.list_ports \
            --collect-submodules PyQt6 \
            --add-data "fonts:fonts" \
            main.py
          # Sanity check — main exe should be x86_64
          file "dist/Videomancer Control.app/Contents/MacOS/Videomancer Control"

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm certificate.p12

      - name: Sign the app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application: Nathaniel Coleman ($APPLE_TEAM_ID)"
          APP="dist/Videomancer Control.app"

          find "$APP/Contents" \( -name "*.dylib" -o -name "*.so" \) -print0 \
            | xargs -0 -I {} codesign --force --timestamp --options runtime \
                --sign "$IDENTITY" {}

          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" -type d -name "*.framework" -print0 \
              | xargs -0 -I {} codesign --force --timestamp --options runtime \
                  --sign "$IDENTITY" {}
          fi

          find "$APP/Contents/MacOS" -type f -perm +111 -print0 \
            | xargs -0 -I {} codesign --force --timestamp --options runtime \
                --entitlements entitlements.plist \
                --sign "$IDENTITY" {}

          codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist \
            --sign "$IDENTITY" \
            "$APP"

          codesign --verify --verbose=2 "$APP"
          codesign -dv --entitlements - "$APP"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "dist/Videomancer Control.app" notarize.zip

          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m

          xcrun stapler staple "dist/Videomancer Control.app"
          xcrun stapler validate "dist/Videomancer Control.app"
          spctl --assess --type execute --verbose=2 "dist/Videomancer Control.app" || true

      - name: Create zip
        run: |
          cd dist
          ditto -c -k --keepParent "Videomancer Control.app" ../VideomancerControl_macOS_Intel.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-intel
          path: VideomancerControl_macOS_Intel.zip


  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyserial pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --onefile --windowed --name "Videomancer Control" --icon "icon.ico" --hidden-import serial.tools.list_ports --add-data "fonts;fonts" main.py

      - name: Create zip
        run: |
          Compress-Archive -Path "dist\Videomancer Control.exe" -DestinationPath VideomancerControl_Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-exe
          path: VideomancerControl_Windows.zip

  release:
    needs: [build-macos, build-macos-intel, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download macOS (Apple Silicon) artifact
        uses: actions/download-artifact@v5
        with:
          name: macos

      - name: Download macOS (Intel) artifact
        uses: actions/download-artifact@v5
        with:
          name: macos-intel

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Videomancer Control ${{ github.ref_name }}
          body: |
            ## Videomancer Control ${{ github.ref_name }}

            Desktop companion app for the LZX Industries Videomancer.

            ### Highlights since v2.4
            - **Native Intel Mac support** — separate Intel zip, chosen automatically by the in-app updater.
            - **In-app auto-updater** — detects new releases, downloads in place, restarts into the update.
            - **Move to Applications prompt** on first launch from Downloads/Desktop.
            - **TSS (Time / Space / Slope) glide** matches the main parameter knobs — no more choppy catch-up.
            - **LFO waveform visualization** — each modulator type (Audio Input, Step Seq, Random, etc.) renders in its own style.
            - **rc16 firmware compatibility** — Audio Input at the new operator ID.
            - **Snapshot polish** — Save As dialog, restore confirmation shows the target program, no lingering "both programs running" artifact, VM-character confirmation dialogs replacing stock Qt popups.
            - **App version shown in the System tab**; bundle is now "Videomancer Control.app" with a space.

            ### Downloads
            - **macOS (Apple Silicon)**: `VideomancerControl_macOS.zip` — M1 / M2 / M3 / M4.
            - **macOS (Intel)**: `VideomancerControl_macOS_Intel.zip` — Intel-based Macs.
            - **Windows**: `VideomancerControl_Windows.zip`

            Both macOS builds are signed and notarized by Apple — no security warnings.
            The in-app updater picks the right one for your machine automatically.

            ### Run from source
            ```
            pip install PyQt6 pyserial
            python main.py
            ```
          files: |
            VideomancerControl_macOS.zip
            VideomancerControl_macOS_Intel.zip
            VideomancerControl_Windows.zip
          draft: false
          prerelease: false
