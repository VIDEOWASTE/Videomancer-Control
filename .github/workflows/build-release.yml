name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyserial pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --windowed \
            --name "VideomancerControl" \
            --icon "icon.icns" \
            --hidden-import serial.tools.list_ports \
            --collect-submodules PyQt6 \
            main.py

      - name: Create zip
        run: |
          cd dist
          zip -r ../VideomancerControl_macOS_ARM.zip "VideomancerControl.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: VideomancerControl_macOS_ARM.zip


  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyserial pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --onefile --windowed --name "VideomancerControl" --icon "icon.ico" --hidden-import serial.tools.list_ports main.py

      - name: Create zip
        run: |
          Compress-Archive -Path "dist\VideomancerControl.exe" -DestinationPath VideomancerControl_Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: VideomancerControl_Windows.zip

  release:
    needs: [build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Videomancer Control ${{ github.ref_name }}
          body: |
            ## Videomancer Control ${{ github.ref_name }} (Pre-Release)

            Desktop companion app for the LZX Industries Videomancer.

            ### Downloads
            - **macOS**: `VideomancerControl_macOS_ARM.zip` — Apple Silicon (M1/M2/M3/M4). Intel Macs can run via Rosetta.
            - **Windows**: `VideomancerControl_Windows.zip`

            First launch on macOS: System Settings > Privacy & Security > Open Anyway

            ### Known Issues
            - TSS (Time/Space/Slope) knob UI response is under development

            ### Run from source
            ```
            pip install PyQt6 pyserial
            python main.py
            ```
          files: |
            VideomancerControl_macOS_ARM.zip
            VideomancerControl_Windows.zip
          draft: false
          prerelease: true
