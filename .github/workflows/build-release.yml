name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyserial pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onedir --windowed \
            --name "Videomancer Control" \
            --icon "icon.icns" \
            --hidden-import serial.tools.list_ports \
            --collect-submodules PyQt6 \
            --add-data "fonts:fonts" \
            main.py

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm certificate.p12

      - name: Sign the app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application: Nathaniel Coleman ($APPLE_TEAM_ID)"
          APP="dist/Videomancer Control.app"

          # Sign all nested Mach-O binaries first (inside-out), then the bundle.
          # --deep is deprecated; we walk the tree ourselves.
          find "$APP/Contents" \( -name "*.dylib" -o -name "*.so" \) -print0 \
            | xargs -0 -I {} codesign --force --timestamp --options runtime \
                --sign "$IDENTITY" {}

          # Sign embedded frameworks (Qt, Python)
          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" -type d -name "*.framework" -print0 \
              | xargs -0 -I {} codesign --force --timestamp --options runtime \
                  --sign "$IDENTITY" {}
          fi

          # Sign all executables in MacOS/ (main + any helpers from onedir)
          find "$APP/Contents/MacOS" -type f -perm +111 -print0 \
            | xargs -0 -I {} codesign --force --timestamp --options runtime \
                --entitlements entitlements.plist \
                --sign "$IDENTITY" {}

          codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist \
            --sign "$IDENTITY" \
            "$APP"

          # Verify hardened runtime is enabled and signature is valid
          codesign --verify --verbose=2 "$APP"
          codesign -dv --entitlements - "$APP"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "dist/Videomancer Control.app" notarize.zip

          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m

          xcrun stapler staple "dist/Videomancer Control.app"
          xcrun stapler validate "dist/Videomancer Control.app"
          spctl --assess --type execute --verbose=2 "dist/Videomancer Control.app" || true

      - name: Create zip
        run: |
          cd dist
          ditto -c -k --keepParent "Videomancer Control.app" ../VideomancerControl_macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos
          path: VideomancerControl_macOS.zip


  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyserial pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --onefile --windowed --name "Videomancer Control" --icon "icon.ico" --hidden-import serial.tools.list_ports --add-data "fonts;fonts" main.py

      - name: Create zip
        run: |
          Compress-Archive -Path "dist\Videomancer Control.exe" -DestinationPath VideomancerControl_Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-exe
          path: VideomancerControl_Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Videomancer Control ${{ github.ref_name }}
          body: |
            ## Videomancer Control ${{ github.ref_name }}

            Desktop companion app for the LZX Industries Videomancer.

            ### What's new in this release
            - **In-app auto-updater** — the app detects a newer GitHub release, downloads and installs it in place, and relaunches. Manual download link lives in the System tab under Documentation → App Releases.
            - **Move to Applications prompt** on first launch from Downloads/Desktop.
            - **LFO waveform visualization** — each modulator type (Audio Input, Step Seq, Random, etc.) renders in a distinct style so you can read the modulation source at a glance.
            - **TSS (Time / Space / Slope) glide** now matches the main parameter knobs — no more choppy catch-up.
            - **rc16 firmware compatibility** — Audio Input correctly mapped to the new operator ID.
            - **Better restore UX** — snapshot restore confirmation shows the target program, no lingering "both programs running" artifact, Save As dialog for snapshots.
            - **Polish** — app version shown in System tab, custom dark confirmation dialogs with the Videomancer character, console noise reduced, tab title spacing locked.

            ### Downloads
            - **macOS**: `VideomancerControl_macOS.zip` — Apple Silicon native (M1/M2/M3/M4). Intel Macs can run via Rosetta.
            - **Windows**: `VideomancerControl_Windows.zip`

            Signed and notarized by Apple — no security warnings on macOS.

            ### Run from source
            ```
            pip install PyQt6 pyserial
            python main.py
            ```
          files: |
            VideomancerControl_macOS.zip
            VideomancerControl_Windows.zip
          draft: false
          prerelease: false
