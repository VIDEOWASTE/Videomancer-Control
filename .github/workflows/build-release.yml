name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyserial pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --windowed \
            --name "VideomancerControl" \
            --icon "icon.icns" \
            --hidden-import serial.tools.list_ports \
            --collect-submodules PyQt6 \
            --add-data "fonts:fonts" \
            main.py

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm certificate.p12

      - name: Sign the app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application: Nathaniel Coleman ($APPLE_TEAM_ID)"
          APP="dist/VideomancerControl.app"

          # Sign all nested Mach-O binaries first (inside-out), then the bundle.
          # --deep is deprecated; we walk the tree ourselves.
          find "$APP/Contents" \( -name "*.dylib" -o -name "*.so" \) -print0 \
            | xargs -0 -I {} codesign --force --timestamp --options runtime \
                --sign "$IDENTITY" {}

          # Sign embedded frameworks (Qt, Python)
          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" -type d -name "*.framework" -print0 \
              | xargs -0 -I {} codesign --force --timestamp --options runtime \
                  --sign "$IDENTITY" {}
          fi

          # Sign the main executable & the outer bundle with entitlements
          codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist \
            --sign "$IDENTITY" \
            "$APP/Contents/MacOS/VideomancerControl" || true

          codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist \
            --sign "$IDENTITY" \
            "$APP"

          # Verify hardened runtime is enabled and signature is valid
          codesign --verify --verbose=2 "$APP"
          codesign -dv --entitlements - "$APP"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent dist/VideomancerControl.app notarize.zip

          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple dist/VideomancerControl.app
          xcrun stapler validate dist/VideomancerControl.app
          spctl --assess --type execute --verbose=2 dist/VideomancerControl.app || true

      - name: Create zip
        run: |
          cd dist
          ditto -c -k --keepParent "VideomancerControl.app" ../VideomancerControl_macOS_ARM.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: VideomancerControl_macOS_ARM.zip


  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyserial pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --onefile --windowed --name "VideomancerControl" --icon "icon.ico" --hidden-import serial.tools.list_ports --add-data "fonts;fonts" main.py

      - name: Create zip
        run: |
          Compress-Archive -Path "dist\VideomancerControl.exe" -DestinationPath VideomancerControl_Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: VideomancerControl_Windows.zip

  release:
    needs: [build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Videomancer Control ${{ github.ref_name }}
          body: |
            ## Videomancer Control ${{ github.ref_name }}

            Desktop companion app for the LZX Industries Videomancer.

            ### Downloads
            - **macOS**: `VideomancerControl_macOS_ARM.zip` — Apple Silicon (M1/M2/M3/M4). Intel Macs can run via Rosetta.
            - **Windows**: `VideomancerControl_Windows.zip`

            Signed and notarized by Apple — no security warnings on macOS.

            ### Run from source
            ```
            pip install PyQt6 pyserial
            python main.py
            ```
          files: |
            VideomancerControl_macOS_ARM.zip
            VideomancerControl_Windows.zip
          draft: false
          prerelease: false
